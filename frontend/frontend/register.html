<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Events Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div id="message-box"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <span>📅</span> EventPortal
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join the portal as a Student or Admin.</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="reg-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="reg-email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Account Role</label>
                    <select id="reg-role" class="form-input form-select">
                        <option value="student">Student (Attendee)</option>
                        <option value="admin">Admin (Organizer)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <span>Register</span>
                    <div id="reg-loader" class="loader hidden"></div>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign in</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
