<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Campus Events Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-body">

    <div id="message-box"></div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-brand">
                <span>📅</span> EventPortal
            </div>
            <div class="navbar-right">
                <div class="nav-welcome">
                    <span class="nav-greeting">Welcome, </span>
                    <span id="nav-username" class="nav-username">User</span>
                    <span id="nav-role" class="nav-role-badge">Role</span>
                </div>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-wrapper">
        <div class="dashboard-grid">

            <!-- ADMIN PANEL (Hidden for Students via JS) -->
            <aside id="admin-panel" class="admin-panel hidden">
                <h2 class="panel-title">
                    <span>✍️</span> Publish Event
                </h2>
                <form id="event-form" class="event-form">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" id="event-title" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" id="event-date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" id="event-location" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="event-desc" rows="3" class="form-input form-textarea" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Create Event</button>
                </form>
            </aside>

            <!-- EVENTS LIST PANEL -->
            <main id="events-panel" class="events-panel">
                <div class="events-header">
                    <h2 class="events-title">Upcoming Events</h2>
                    <button onclick="fetchEvents()" class="btn-refresh">
                        <span>🔄</span> Refresh
                    </button>
                </div>

                <div id="event-list" class="event-list">
                    <!-- Events injected here by JS -->
                </div>
            </main>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
