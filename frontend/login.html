<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Events Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div id="message-box"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <span>📅</span> EventPortal
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to manage and discover campus events.</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="login-email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" required>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <span>Sign In</span>
                    <div id="login-loader" class="loader hidden"></div>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Register here</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
